spring.application.name=student-feedback-backend

# Default to local settings unless a deployment explicitly activates another profile.
spring.profiles.default=local

# Common JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED}

server.port=${PORT:8080}
