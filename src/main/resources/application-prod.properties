# Production profile for Render deployment
# DO NOT commit real credentials here - use Render Environment Variables

# Database Configuration
# Use a JDBC URL for Railway's public MySQL endpoint so external hosts like Render can connect.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://shuttle.proxy.rlwy.net:22555/${MYSQLDATABASE:railway}}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:WDaXgqXfUoVQtnQjyRCIpaBtfsnlgYqi}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP) - optimized for cloud deployment
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mail Configuration (must be set via Render Environment Variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server
server.port=${PORT:8080}

# Logging
logging.level.org.springframework=WARN
logging.level.com.student.feedback=INFO

